<!DOCTYPE html>
<html lang="en">

<head>
    <title>My Theme — SkinManager</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            color-scheme: dark;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif !important;
            background: #101010 !important;
            color: #d0d0d0 !important;
            font-size: 14px !important;
        }

        @font-face {
            font-family: 'Material Icons';
            font-style: normal;
            font-weight: 400;
            font-display: block;
            src: url(https://fonts.gstatic.com/s/materialicons/v142/flUhRq6tzZclQEJ-Vdg-IuiaDsNcIhQ8tQ.woff2) format('woff2');
        }

        .material-icons {
            font-family: 'Material Icons';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }

        .sm-topbar {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 4px 8px;
            background: rgba(18, 18, 18, 0.97) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .sm-topbar-title {
            font-size: .95em;
            font-weight: 600;
            opacity: .75;
            margin-left: 6px;
        }

        .sm-nav-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: #fff;
            cursor: pointer;
            opacity: 0.76;
            transition: background-color .2s, opacity .2s;
            padding: 0;
            flex-shrink: 0;
        }

        .sm-nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            opacity: 1;
        }

        .sm-nav-btn .material-icons {
            font-size: 24px;
            user-select: none;
        }

        #sm-loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(16, 16, 16, .85);
            z-index: 9999;
            transition: opacity .25s;
        }

        #sm-loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .sm-spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255, 255, 255, .12);
            border-top-color: #00a4dc;
            border-radius: 50%;
            animation: sm-spin .7s linear infinite;
        }

        @keyframes sm-spin {
            to {
                transform: rotate(360deg);
            }
        }

        .content-primary {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5em 1.25em 4em;
        }

        h2 {
            font-size: 1.4em;
            font-weight: 300;
            margin: 0 0 .25em;
            color: #fff;
        }

        .itemsContainer {
            display: block;
        }

        .itemsContainer.vertical-wrap {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: flex-start;
            align-content: flex-start;
            gap: 8px;
            padding: 4px 0;
        }

        .card {
            flex-shrink: 0;
            position: relative;
            cursor: default;
        }

        .overflowBackdropCard {
            width: 220px;
        }

        .cardBox {
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.04);
        }

        .cardScalable {
            position: relative;
        }

        .cardPadder {
            padding-bottom: 56.25%;
            position: relative;
        }

        .cardPadder-backdrop {
            padding-bottom: 56.25%;
        }

        .cardContent {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .cardImageContainer {
            position: absolute;
            inset: 0;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.06);
        }

        .coveredImage {
            background-size: cover;
            background-position: center top;
        }

        .cardImageContainer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            display: block;
        }

        .cardFooter {
            padding: 8px;
            background: rgba(0, 0, 0, 0.45);
        }

        .cardText {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: .82em;
            line-height: 1.4;
        }

        .cardText-secondary {
            opacity: .65;
            font-size: .78em;
        }

        .card.selectedCard {
            box-shadow: 0 0 0 3px #00a4dc;
            border-radius: 4px;
        }

        .activeBar {
            display: flex;
            align-items: center;
            gap: .75em;
            padding: .6em 1em;
            background: rgba(0, 164, 220, .1);
            border: 1px solid rgba(0, 164, 220, .3);
            border-radius: 4px;
            margin-bottom: 1em;
            font-size: .9em;
        }

        .activeDot {
            width: 8px;
            height: 8px;
            background: #00e676;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .stateMsg {
            width: 100%;
            padding: 3em 1em;
            text-align: center;
            opacity: .45;
        }

        .emby-input,
        input[type="text"],
        input[type="number"],
        select {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 4px;
            color: inherit;
            padding: 7px 10px;
            font-family: inherit;
            font-size: .9em;
        }

        input[type="text"] {
            width: 100%;
        }

        .inputLabel,
        .inputLabelUnfocused {
            display: block;
            font-size: .78em;
            opacity: .6;
            margin-bottom: 3px;
        }

        .inputContainer {
            margin-bottom: .25em;
        }

        .emby-button,
        button[is="emby-button"] {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: .4em 1em;
            border-radius: 3px;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.09);
            color: inherit;
            cursor: pointer;
            font-size: inherit;
            font-family: inherit;
            text-decoration: none;
            transition: background .15s;
        }

        .emby-button:hover,
        button[is="emby-button"]:hover {
            background: rgba(255, 255, 255, 0.17);
        }

        .raised.button-submit {
            background: #00a4dc;
            color: #fff;
            border-color: transparent;
        }

        .raised.button-submit:hover {
            background: #0090c8;
        }

        .emby-button:disabled,
        button:disabled {
            opacity: .45;
            cursor: default;
        }

        #tagFilters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0 16px;
        }
    </style>
</head>

<body>
    <div id="sm-loading">
        <div class="sm-spinner"></div>
    </div>

    <nav class="sm-topbar">
        <button type="button" class="sm-nav-btn" title="Back to Preferences"
            onclick="window.location.href='/web/index.html#/mypreferencesmenu'">
            <span class="material-icons" aria-hidden="true">arrow_back</span>
        </button>
        <button type="button" class="sm-nav-btn" title="Home" onclick="window.location.href='/web/index.html'">
            <span class="material-icons" aria-hidden="true">home</span>
        </button>
        <span class="sm-topbar-title">My Theme</span>
    </nav>
    <div id="SkinManagerUserThemePage" data-role="page" class="page type-interior smUserPage"
        data-require="emby-input,emby-button,emby-select">

        <div data-role="content">
            <div class="content-primary">

                <h2>My Theme</h2>
                <p style="font-size:.85em;opacity:.55;margin-top:-.25em;margin-bottom:1em;" id="userGreeting"></p>

                <div id="disabledNotice" style="display:none;padding:2em 1em;text-align:center;opacity:.6;">
                    Your administrator has not enabled per-user theme selection.
                </div>

                <div id="mainContent">
                    <div class="activeBar" id="activeBar" style="display:none">
                        <div class="activeDot"></div>
                        <span>Your theme: <strong id="activeName"></strong></span>
                        <button is="emby-button" type="button" id="btnReset" class="emby-button"
                            style="margin-left:auto">
                            Reset to server default
                        </button>
                    </div>

                    <div id="serverNotice" style="font-size:.82em;opacity:.5;margin-bottom:.75em;"></div>

                    <div class="inputContainer" style="margin-bottom:.25em">
                        <label class="inputLabel inputLabelUnfocused" for="searchInput">Search</label>
                        <input type="text" id="searchInput" class="emby-input" placeholder="Search themes…" />
                    </div>

                    <div id="tagFilters"
                        style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;margin-bottom:16px;"></div>

                    <div id="themeGrid" class="itemsContainer vertical-wrap">
                        <div class="stateMsg">Loading themes…</div>
                    </div>

                    <div style="margin-top:1.5em;display:flex;align-items:center;gap:1em;flex-wrap:wrap">
                        <span id="pendingLabel" style="font-size:.85em;opacity:.6">No pending changes</span>
                        <button is="emby-button" type="button" id="btnSave" class="raised button-submit emby-button"
                            disabled>
                            Save My Theme
                        </button>
                    </div>
                    <p style="font-size:.8em;opacity:.45;margin-top:.75em">
                        Your theme is stored in this browser only and overrides the server theme just for you.
                    </p>
                </div>

            </div>
        </div>

        <script type="text/javascript">
            (function () {
                var CACHE_CSS = 'skinmanager-user-v';
                var MANIFEST_API = '/api/SkinManager/ManifestInfo';

                function getLsKey() {
                    try {
                        var creds = JSON.parse(localStorage.getItem('jellyfin_credentials') || '{}');
                        var srv = (creds.Servers || [])[0] || {};
                        var uid = srv.UserId || '';
                        var token = srv.AccessToken || '';
                        return 'skinmanager-user-override' + (uid && token ? '-' + uid : '');
                    } catch (e) { return 'skinmanager-user-override'; }
                }

                function authHeaders() {
                    try {
                        var creds = JSON.parse(localStorage.getItem('jellyfin_credentials') || '{}');
                        var token = ((creds.Servers || [])[0] || {}).AccessToken || '';
                        if (token) return { 'X-MediaBrowser-Token': token };
                    } catch (e) { }
                    return {};
                }

                function showLoading() { var l = document.getElementById('sm-loading'); if (l) l.classList.remove('hidden'); }
                function hideLoading() { var l = document.getElementById('sm-loading'); if (l) l.classList.add('hidden'); }

                var STYLE_TAG_OFF = 'display:inline-block;padding:5px 14px;border-radius:999px;border:1px solid rgba(255,255,255,0.28);background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.7);font-size:12px;line-height:1.4;cursor:pointer;user-select:none;box-sizing:border-box;';
                var STYLE_TAG_ON = 'display:inline-block;padding:5px 14px;border-radius:999px;border:1px solid #00a4dc;background:#00a4dc;color:#fff;font-size:12px;line-height:1.4;cursor:pointer;user-select:none;box-sizing:border-box;font-weight:700;';

                var state = {
                    themes: [], selected: null, active: null,
                    activeTags: [], query: '',
                    themeVars: {}, pendingVars: null, pendingHasAddons: false,
                    adminSkinName: '', manifestUrl: ''
                };

                function el(id) { return document.getElementById(id); }

                function getSaved() {
                    try { return JSON.parse(localStorage.getItem(getLsKey()) || 'null'); } catch (e) { return null; }
                }

                function safeParseJson(str, fallback) {
                    try { return JSON.parse(str || '{}') || fallback; } catch (e) { return fallback; }
                }

                function toKebabCase(key) {
                    key = (key || '').trim().replace(/^-+/, '');
                    key = key.replace(/([a-z])([A-Z])/g, '$1-$2');
                    return key.replace(/_/g, '-').toLowerCase();
                }

                function substituteVars(code, vars) {
                    Object.keys(vars).forEach(function (key) {
                        code = code.split('{{' + key + '}}').join(vars[key]);
                    });
                    return code;
                }

                function init() {
                    showLoading();
                    state.selected = null;
                    state.pendingVars = null;

                    fetch('/Users/Me', { headers: authHeaders() })
                        .then(function (r) { return r.ok ? r.json() : null; })
                        .then(function (user) {
                            if (user && user.Name)
                                el('userGreeting').textContent = 'Customise the theme for ' + user.Name + '.';
                        }).catch(function () { });

                    fetch(MANIFEST_API)
                        .then(function (r) { return r.json(); })
                        .then(function (info) {
                            if (!info.AllowUserThemes) {
                                el('disabledNotice').style.display = '';
                                el('mainContent').style.display = 'none';
                                hideLoading();
                                return;
                            }

                            state.manifestUrl = info.ManifestUrl || '';
                            state.adminSkinName = info.AdminSkinName || '';

                            var notice = el('serverNotice');
                            if (state.adminSkinName && state.adminSkinName !== 'Default') {
                                notice.textContent = 'Your selection replaces the server default (' + state.adminSkinName + ') for you only.';
                            } else {
                                notice.textContent = 'No server-wide theme is set.';
                            }

                            var saved = getSaved();
                            if (saved && saved.name) {
                                state.active = saved;
                                state.themeVars = saved.vars || {};
                                el('activeName').textContent = saved.name;
                                el('activeBar').style.display = 'flex';
                            }

                            updatePending();

                            if (state.manifestUrl) {
                                loadThemes(state.manifestUrl);
                            } else {
                                el('themeGrid').innerHTML = '<div class="stateMsg">No manifest URL configured by the admin.</div>';
                                hideLoading();
                            }
                        })
                        .catch(function (err) {
                            el('themeGrid').innerHTML = '<div class="stateMsg">Could not reach server: ' + err.message + '</div>';
                            hideLoading();
                        });
                }

                function loadThemes(url) {
                    el('themeGrid').innerHTML = '<div class="stateMsg">Loading themes…</div>';
                    fetch(url)
                        .then(function (r) {
                            if (!r.ok) throw new Error('HTTP ' + r.status);
                            return r.json();
                        })
                        .then(function (themes) {
                            state.themes = themes;
                            if (state.active && state.active.name) {
                                var match = themes.find(function (t) { return t.name === state.active.name; });
                                if (match) state.active = Object.assign({}, state.active, match);
                            }
                            buildTags(themes);
                            render();
                            hideLoading();
                        })
                        .catch(function (err) {
                            el('themeGrid').innerHTML = '<div class="stateMsg">Could not load: ' + err.message + '</div>';
                            hideLoading();
                        });
                }

                function buildTags(themes) {
                    var set = {};
                    themes.forEach(function (t) { (t.tags || []).forEach(function (g) { set[g] = true; }); });
                    state.activeTags = [];
                    var c = el('tagFilters');
                    c.innerHTML = '';
                    Object.keys(set).sort().forEach(function (tag) {
                        var b = document.createElement('span');
                        b.setAttribute('style', STYLE_TAG_OFF);
                        b.textContent = tag;
                        b.addEventListener('click', function () {
                            var i = state.activeTags.indexOf(tag);
                            if (i === -1) { state.activeTags.push(tag); b.setAttribute('style', STYLE_TAG_ON); }
                            else { state.activeTags.splice(i, 1); b.setAttribute('style', STYLE_TAG_OFF); }
                            render();
                        });
                        c.appendChild(b);
                    });
                }

                function render() {
                    var q = state.query.toLowerCase();
                    var filtered = state.themes.filter(function (t) {
                        var mq = !q ||
                            (t.name || '').toLowerCase().includes(q) ||
                            (t.author || '').toLowerCase().includes(q) ||
                            (t.description || '').toLowerCase().includes(q);
                        var mt = state.activeTags.length === 0 ||
                            state.activeTags.every(function (tag) { return (t.tags || []).includes(tag); });
                        return mq && mt;
                    });
                    var grid = el('themeGrid');
                    if (filtered.length === 0) { grid.innerHTML = '<div class="stateMsg">No themes match your search.</div>'; return; }
                    grid.innerHTML = '';
                    filtered.forEach(function (theme) { grid.appendChild(buildCard(theme)); });
                }

                function buildCard(theme) {
                    var hasPending = state.selected !== null;
                    var isSel = hasPending
                        ? (state.selected && state.selected.name === (theme.name || ''))
                        : (state.active && state.active.name === (theme.name || ''));

                    var card = document.createElement('div');
                    card.className = 'card overflowBackdropCard' + (isSel ? ' selectedCard' : '');
                    card.style.cssText = 'min-width:200px;max-width:260px;cursor:default;';

                    var cardBox = document.createElement('div');
                    cardBox.className = 'cardBox';
                    cardBox.style.position = 'relative';

                    var cardScalable = document.createElement('div');
                    cardScalable.className = 'cardScalable';
                    var cardPadder = document.createElement('div');
                    cardPadder.className = 'cardPadder cardPadder-backdrop';
                    var cardContent = document.createElement('div');
                    cardContent.className = 'cardContent';

                    var imgContainer = document.createElement('div');
                    imgContainer.className = 'cardImageContainer coveredImage';
                    if (theme.previewUrl) {
                        var img = document.createElement('img');
                        img.src = theme.previewUrl;
                        img.alt = theme.name || '';
                        img.style.cssText = 'width:100%;height:100%;object-fit:cover;object-position:top center;display:block;cursor:zoom-in;';
                        img.onerror = function () {
                            img.remove();
                            imgContainer.style.cssText += 'display:flex;align-items:center;justify-content:center;font-size:2.5em;opacity:.2;';
                            imgContainer.textContent = '🎨';
                        };
                        img.title = 'Click to preview';
                        img.addEventListener('click', function (e) { e.stopPropagation(); openPreviewModal(theme); });
                        imgContainer.appendChild(img);
                    } else {
                        imgContainer.style.cssText += 'display:flex;align-items:center;justify-content:center;font-size:2.5em;opacity:.2;';
                        imgContainer.textContent = '🎨';
                    }

                    cardContent.appendChild(imgContainer);
                    cardPadder.appendChild(cardContent);
                    cardScalable.appendChild(cardPadder);
                    cardBox.appendChild(cardScalable);

                    if (isSel) {
                        var chk = document.createElement('div');
                        chk.style.cssText = 'position:absolute;top:6px;right:6px;background:#00a4dc;color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;z-index:10;pointer-events:none;';
                        chk.textContent = '✓';
                        cardBox.appendChild(chk);
                    }

                    var footer = document.createElement('div');
                    footer.className = 'cardFooter';

                    var cardText = document.createElement('div');
                    cardText.className = 'cardText';
                    cardText.style.fontWeight = 'bold';
                    cardText.textContent = theme.name || '';
                    footer.appendChild(cardText);

                    if (theme.author) {
                        var authText = document.createElement('div');
                        authText.className = 'cardText cardText-secondary';
                        authText.textContent = 'by ' + theme.author;
                        footer.appendChild(authText);
                    }

                    if (theme.description) {
                        var descText = document.createElement('div');
                        descText.className = 'cardText cardText-secondary';
                        descText.style.cssText = 'display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-size:.8em;opacity:.7;margin-top:.2em';
                        descText.textContent = theme.description;
                        footer.appendChild(descText);
                    }

                    var btnRow = document.createElement('div');
                    btnRow.style.cssText = 'display:flex;gap:.4em;margin-top:.6em;padding-bottom:.4em';

                    var selBtn = document.createElement('button');
                    selBtn.setAttribute('is', 'emby-button');
                    selBtn.className = 'raised emby-button' + (isSel ? ' button-submit' : '');
                    selBtn.style.cssText = 'flex:1;padding:.35em .5em;font-size:.78em';
                    selBtn.textContent = isSel ? '✓ Selected' : 'Select';
                    selBtn.disabled = isSel;
                    selBtn.addEventListener('click', function () { pick(theme); });
                    btnRow.appendChild(selBtn);

                    if (isSel && ((theme.vars || []).length > 0)) {
                        var cfgBtn = document.createElement('button');
                        cfgBtn.setAttribute('is', 'emby-button');
                        cfgBtn.className = 'emby-button';
                        cfgBtn.style.cssText = 'padding:.35em .6em;font-size:.78em;border:1px solid rgba(255,255,255,.2)';
                        cfgBtn.textContent = '⚙';
                        cfgBtn.title = 'Configure theme variables';
                        cfgBtn.addEventListener('click', function () { openVarsModal(theme); });
                        btnRow.appendChild(cfgBtn);
                    }

                    if (theme.sourceUrl) {
                        var srcBtn = document.createElement('a');
                        srcBtn.className = 'emby-button';
                        srcBtn.style.cssText = 'padding:.35em .6em;font-size:.78em;border:1px solid rgba(255,255,255,.2)';
                        srcBtn.textContent = '↗';
                        srcBtn.title = 'View source';
                        srcBtn.href = theme.sourceUrl;
                        srcBtn.target = '_blank';
                        srcBtn.rel = 'noopener noreferrer';
                        btnRow.appendChild(srcBtn);
                    }

                    footer.appendChild(btnRow);
                    cardBox.appendChild(footer);
                    card.appendChild(cardBox);
                    return card;
                }

                function pick(theme) {
                    state.selected = theme;
                    state.pendingHasAddons = false;
                    if (theme.cssUrl) {
                        fetch(theme.cssUrl).then(function (r) { return r.text(); }).then(function (text) {
                            state.pendingHasAddons = /@sm-import-if/.test(text);
                        }).catch(function () { });
                    }
                    updatePending();
                    render();
                    el('btnSave').disabled = false;
                }

                function updatePending() {
                    var lbl = el('pendingLabel');
                    if (state.selected) {
                        lbl.textContent = 'Pending: ' + state.selected.name;
                        lbl.style.color = '#00a4dc';
                    } else if (state.pendingVars !== null) {
                        var name = state.active ? state.active.name : 'theme';
                        lbl.textContent = 'Pending variable changes — ' + name;
                        lbl.style.color = '#00a4dc';
                    } else if (state.active) {
                        lbl.textContent = 'Your theme: ' + state.active.name;
                        lbl.style.color = '';
                    } else {
                        lbl.textContent = 'No pending changes';
                        lbl.style.color = '';
                    }
                }

                function doSave() {
                    if (!state.selected && state.pendingVars === null) return;
                    var theme = state.selected || state.active;
                    if (!theme) return;
                    var vars = state.pendingVars !== null ? state.pendingVars : state.themeVars;

                    var override = {
                        name: theme.name || '',
                        cssUrl: theme.cssUrl || '',
                        version: theme.version || '',
                        vars: vars || {},
                        preconnect: theme.preconnect || []
                    };
                    localStorage.setItem(getLsKey(), JSON.stringify(override));

                    applyPreview(override);

                    state.active = override;
                    state.themeVars = vars;
                    state.selected = null;
                    state.pendingVars = null;
                    el('activeName').textContent = override.name;
                    el('activeBar').style.display = 'flex';
                    el('btnSave').disabled = true;
                    updatePending();
                    render();
                }

                function doReset() {
                    localStorage.removeItem(getLsKey());
                    ['skinmanager-user-theme', 'skinmanager-user-vars'].forEach(function (id) {
                        var e = document.getElementById(id); if (e) e.remove();
                    });
                    state.active = null;
                    state.selected = null;
                    state.themeVars = {};

                            input = document.createElement('select');
                            [['true', trueVal], ['false', falseVal]].forEach(function (pair) {
                                var o = document.createElement('option'); o.value = pair[1]; o.textContent = pair[0]; o.style.background = '#1a1d21'; o.style.color = '#fff';
                                input.appendChild(o);
                            });
                            input.value = savedVal;
                            input.name = 'sm-var-' + v.key; input.id = 'sm-var-' + v.key;
                            input.style.cssText = 'color-scheme:dark;width:100%;padding:7px 10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:5px;color:inherit;font-size:.85em;font-family:inherit;box-sizing:border-box;';
                            input.dataset.varKey = v.key;
                            row.appendChild(input);
                        } else if (inputType === 'color') {
                            var colorWidget = buildColorInput(saved[v.key] !== undefined ? saved[v.key] : null, v.default || '#000000', v.allowGradient !== false);
                            colorWidget.querySelector('input[type=hidden]').dataset.varKey = v.key;
                            row.appendChild(colorWidget);
                        } else {
                            input = document.createElement('input');
                            input.type = inputType === 'number' ? 'number' : 'text';
                            input.value = saved[v.key] !== undefined ? saved[v.key] : (v.default || '');
                            input.placeholder = v.default || '';
                            input.name = 'sm-var-' + v.key; input.id = 'sm-var-' + v.key;
                            input.style.cssText = 'width:100%;padding:7px 10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:5px;color:inherit;font-size:.85em;font-family:inherit;box-sizing:border-box;';
                            input.dataset.varKey = v.key;
                            row.appendChild(input);
                        }
                        container.appendChild(row);
                    });
                    dialog.appendChild(container);

                    var actions = document.createElement('div'); actions.style.cssText = 'display:flex;gap:8px;margin-top:20px;justify-content:flex-end;';
                    var cancelBtn = document.createElement('button'); cancelBtn.setAttribute('is', 'emby-button'); cancelBtn.className = 'emby-button'; cancelBtn.textContent = 'Cancel';
                    cancelBtn.addEventListener('click', function () { overlay.remove(); });
                    var saveBtn = document.createElement('button'); saveBtn.setAttribute('is', 'emby-button'); saveBtn.className = 'raised button-submit emby-button'; saveBtn.textContent = 'Save';
                    saveBtn.addEventListener('click', function () {
                        var values = {};
                        container.querySelectorAll('[data-var-key]').forEach(function (i) {
                            if (i.type === 'hidden' || !values.hasOwnProperty(i.dataset.varKey)) {

                        state.pendingVars = values;
                        el('btnSave').disabled = false;

                    actions.appendChild(cancelBtn); actions.appendChild(saveBtn);
                    dialog.appendChild(actions);
                    overlay.appendChild(dialog);
                    overlay.addEventListener('click', function (e) { if (e.target === overlay) overlay.remove(); });
                    document.body.appendChild(overlay);
                }

                el('searchInput').addEventListener('input', function () { state.query = this.value; render(); });
                el('btnSave').addEventListener('click', doSave);
                el('btnReset').addEventListener('click', doReset);

                document.addEventListener('DOMContentLoaded', init);

            })();
        </script>
